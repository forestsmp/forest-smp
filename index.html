<!DOCTYPE html>
<html>
<head>
    <title>Merchant Shop</title>
    <script src="https://checkout.bakongrelay.com/static/js/checkout.min.js"></script>
</head>
<body>
    <button id="payButton">ទូទាត់ឥឡូវនេះ</button>

    <script>
        // ឧទាហរណ៍ Session ID ដែលទទួលបានពី Backend
        const sessionId = "pQ0jrGGv1Xkr"; 

        document.getElementById('payButton').onclick = function() {
            BakongRelay.pay(sessionId);
        };

        // ស្ដាប់ព្រឹត្តិការណ៍នៅពេលទូទាត់ជោគជ័យ
        window.addEventListener('bakongPaymentSuccess', function(e) {
            console.log("ការទូទាត់ជោគជ័យ:", e.detail.session_id);
            alert("អរគុណសម្រាប់ការទូទាត់!");
        });
    </script>
</body>
</html>
